name: Deploy .pbit ao OneDrive

on:
  push:
    branches:
      - main
    paths:
      - "CI_CD_PBIT_ONEDRIVE/dashboards/**/*.pbit"

  workflow_dispatch:
    inputs:
      dashboard:
        description: "Nome do arquivo .pbit (ex: vendas.pbit). Vazio = publica todos os alterados."
        required: false
        default: ""

jobs:
  deploy:
    name: Enviar .pbit ao OneDrive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r CI_CD_PBIT_ONEDRIVE/scripts/requirements.txt

      - name: Determinar dashboards alterados
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.dashboard }}" ]; then
            echo "files=CI_CD_PBIT_ONEDRIVE/dashboards/${{ github.event.inputs.dashboard }}" >> "$GITHUB_OUTPUT"
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'CI_CD_PBIT_ONEDRIVE/dashboards/*.pbit' | tr '\n' ' ')
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Enviar ao OneDrive
        env:
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_FOLDER_PATH: ${{ secrets.ONEDRIVE_FOLDER_PATH }}
        run: |
          python CI_CD_PBIT_ONEDRIVE/scripts/deploy_pbit_onedrive.py ${{ steps.changed.outputs.files }}
