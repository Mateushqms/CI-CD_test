name: Deploy Power BI Dashboards

on:
  push:
    branches:
      - main
    paths:
      - "dashboards/**/*.pbix"

  workflow_dispatch:
    inputs:
      dashboard:
        description: "Nome do arquivo .pbix (ex: vendas.pbix). Vazio = publica todos os alterados."
        required: false
        default: ""

jobs:
  deploy:
    name: Publicar dashboards no Power BI
    runs-on: windows-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determinar dashboards alterados
        id: changed
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.dashboard }}" -ne "") {
            "files=dashboards/${{ github.event.inputs.dashboard }}" >> $env:GITHUB_OUTPUT
          } else {
            $files = git diff --name-only HEAD~1 HEAD -- 'dashboards/*.pbix' | Where-Object { $_ -match "\.pbix$" }
            "files=$($files -join ' ')" >> $env:GITHUB_OUTPUT
          }

      - name: Publicar via PowerShell
        shell: pwsh
        env:
          PBI_USER: ${{ secrets.PBI_USER }}
          PBI_PASSWORD: ${{ secrets.PBI_PASSWORD }}
          PBI_WORKSPACE_ID: ${{ secrets.PBI_WORKSPACE_ID }}
        run: |
          Install-Module -Name MicrosoftPowerBIMgmt -Scope CurrentUser -Force -AllowClobber -ErrorAction Stop

          $pass = ConvertTo-SecureString $env:PBI_PASSWORD -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential($env:PBI_USER, $pass)
          Connect-PowerBIServiceAccount -Credential $cred

          $rawFiles = "${{ steps.changed.outputs.files }}"
          $files = $rawFiles.Trim() -split "\s+" | Where-Object { $_ -match "\.pbix$" }

          if ($files.Count -eq 0) {
            Write-Host "Nenhum arquivo .pbix encontrado. Nada a publicar."
            exit 0
          }

          $errors = @()
          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              Write-Host "Arquivo nao encontrado, pulando: $file"
              continue
            }
            $name = [System.IO.Path]::GetFileNameWithoutExtension($file)
            try {
              if ([string]::IsNullOrWhiteSpace($env:PBI_WORKSPACE_ID)) {
                # Publica no My Workspace quando ID não for informado
                Write-Host "Publicando: $file -> My Workspace"
                New-PowerBIReport -Path $file -Name $name -ConflictAction CreateOrOverwrite
              } else {
                Write-Host "Publicando: $file -> workspace $env:PBI_WORKSPACE_ID"
                New-PowerBIReport -Path $file -WorkspaceId $env:PBI_WORKSPACE_ID -Name $name -ConflictAction CreateOrOverwrite
              }
              Write-Host "Publicado com sucesso: $name"
            } catch {
              Write-Host "ERRO ao publicar $name`: $_"
              $errors += $file
            }
          }

          if ($errors.Count -gt 0) {
            Write-Host "Falha em $($errors.Count) arquivo(s): $($errors -join ', ')"
            exit 1
          }
